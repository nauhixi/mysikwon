<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식권 사용 업체 안내 | Sono Trinity</title>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7862a2416ba9e0c6e9cfae0c18e401aa"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ci: #6B6158;
    --ci-deep: #4E4840;
    --ci-light: #9E968C;
    --bg: #F4F1EC;
    --surface: #FFFFFF;
    --surface-2: #FAF8F5;
    --surface-3: #F0ECE5;
    --border: #E2DDD6;
    --border-hover: #C8C2B8;
    --text-primary: #2A2520;
    --text-secondary: #6B6158;
    --text-muted: #9E968C;
    --accent-korean: #C0392B;
    --accent-chinese: #D35400;
    --accent-japanese: #6C3483;
    --accent-western: #1A5276;
    --accent-cafe: #7D5A3C;
    --accent-convenience: #1E6B3C;
    --accent-other: #5D6D7E;
    --ticket-8000: #EBF7EE;
    --ticket-8000-text: #1E6B3C;
    --ticket-4500: #EBF2FA;
    --ticket-4500-text: #1A5276;
    --ticket-5000: #FDF3E3;
    --ticket-5000-text: #7D5A3C;
    --shadow-sm: 0 1px 4px rgba(107,97,88,0.08), 0 4px 16px rgba(107,97,88,0.06);
    --shadow-md: 0 4px 12px rgba(107,97,88,0.10), 0 12px 32px rgba(107,97,88,0.08);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ──────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 36px 40px 32px;
    position: relative;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: start;
  }
  .header-left { display: flex; flex-direction: column; }

  .ci-logo { margin-bottom: 24px; }
  .header-logo-img {
    height: 52px;
    width: auto;
    display: block;
    mix-blend-mode: multiply;
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 400;
  }
  .header-title-row {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .header-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 400;
    line-height: 1.15;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }
  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 16px;
  }

  /* Mode switch */
  .mode-switch {
    display: flex;
    gap: 4px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
  }
  .mode-btn {
    padding: 9px 20px;
    border-radius: 50px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mode-btn:hover { color: var(--text-secondary); }
  .mode-btn.active {
    background: var(--ci);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(107,97,88,0.25);
  }

  /* Stats */
  .header-stats {
    display: flex;
    gap: 0;
    flex-wrap: wrap;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface-2);
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    padding: 12px 20px;
    border-right: 1px solid var(--border);
  }
  .stat-item:last-child { border-right: none; }
  .stat-num {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--ci);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .stat-divider { display: none; }

  /* ── Main ────────────────────────────── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ── Search & Filter ─────────────────── */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-icon {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 15px;
  }
  .search-input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus {
    border-color: var(--ci);
    box-shadow: 0 0 0 3px rgba(107,97,88,0.1), var(--shadow-sm);
  }
  .price-filter {
    display: flex;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: var(--shadow-sm);
  }
  .price-btn {
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .price-btn:hover { color: var(--text-secondary); background: var(--surface-2); }
  .price-btn.active {
    background: var(--ci);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(107,97,88,0.2);
  }

  /* ── Map ─────────────────────────────── */
  .map-section {
    margin-bottom: 22px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }
  .map-section-header {
    padding: 13px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 4px;
    background: var(--surface-2);
  }
  .map-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .map-section-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--ci);
    border-radius: 50%;
  }
  .map-section-sub {
    font-size: 11px;
    color: var(--text-muted);
  }
  #map { height: 420px; width: 100%; }

  /* Kakao popup */
  .kakao-popup {
    min-width: 170px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--border, #E2DDD6);
    box-shadow: 0 8px 32px rgba(107,97,88,0.2);
    font-family: 'Noto Sans KR', sans-serif;
    padding: 14px 16px;
    position: relative;
    font-size: 13px;
    line-height: 1.6;
  }
  .kakao-popup .popup-close {
    position: absolute;
    top: 8px; right: 10px;
    background: none; border: none;
    cursor: pointer; font-size: 13px;
    color: #9E968C;
    transition: color 0.15s;
  }
  .kakao-popup .popup-close:hover { color: #4E4840; }

  /* ── Category Tabs ───────────────────── */
  .category-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .cat-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .cat-tab:hover {
    border-color: var(--border-hover);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .cat-tab.active {
    color: #fff;
    border-color: transparent;
    box-shadow: var(--shadow-md);
  }
  .cat-tab .emoji { font-size: 14px; }
  .cat-tab .count {
    font-size: 10px;
    background: rgba(255,255,255,0.25);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .cat-tab:not(.active) .count {
    background: var(--surface-3);
    color: var(--text-muted);
  }

  .cat-tab[data-cat="전체"].active   { background: var(--ci); }
  .cat-tab[data-cat="한식"].active   { background: var(--accent-korean); }
  .cat-tab[data-cat="중식"].active   { background: var(--accent-chinese); }
  .cat-tab[data-cat="일식"].active   { background: var(--accent-japanese); }
  .cat-tab[data-cat="양식"].active   { background: var(--accent-western); }
  .cat-tab[data-cat="카페·디저트"].active { background: var(--accent-cafe); }
  .cat-tab[data-cat="편의점"].active { background: var(--accent-convenience); }
  .cat-tab[data-cat="기타"].active   { background: var(--accent-other); }

  /* ── Location group ──────────────────── */
  .location-group { margin-bottom: 40px; }
  .location-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .location-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ci);
    flex-shrink: 0;
  }
  .location-name {
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--ci);
    letter-spacing: -0.2px;
  }
  .location-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Cards Grid ──────────────────────── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }
  .restaurant-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px 14px;
    transition: all 0.22s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
    color: inherit;
    box-shadow: var(--shadow-sm);
  }
  .restaurant-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 3px;
  }
  .restaurant-card[data-cat="한식"]::before   { background: var(--accent-korean); }
  .restaurant-card[data-cat="중식"]::before   { background: var(--accent-chinese); }
  .restaurant-card[data-cat="일식"]::before   { background: var(--accent-japanese); }
  .restaurant-card[data-cat="양식"]::before   { background: var(--accent-western); }
  .restaurant-card[data-cat="카페·디저트"]::before { background: var(--accent-cafe); }
  .restaurant-card[data-cat="편의점"]::before { background: var(--accent-convenience); }
  .restaurant-card[data-cat="기타"]::before   { background: var(--accent-other); }

  .restaurant-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }
  .restaurant-card:hover .map-hint { opacity: 1; transform: translateY(0); }

  .map-hint {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--ci);
    font-weight: 600;
    margin-top: 8px;
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.18s;
  }
  .map-hint::before { content: '🗺️'; font-size: 11px; }
  .map-hint::after  { content: ' 카카오맵에서 보기'; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
    flex: 1;
  }
  .card-num {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    font-weight: 400;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .card-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 50px;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .tag-cat {
    background: var(--surface-3);
    color: var(--text-secondary);
    border-color: var(--border);
  }
  .tag-price-8000 { background: var(--ticket-8000); color: var(--ticket-8000-text); }
  .tag-price-4500 { background: var(--ticket-4500); color: var(--ticket-4500-text); }
  .tag-price-5000 { background: var(--ticket-5000); color: var(--ticket-5000-text); }

  .card-addr {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }
  .stars { display: flex; gap: 2px; }
  .star {
    font-size: 15px;
    cursor: pointer;
    color: #DDD8D0;
    transition: color 0.1s, transform 0.1s;
    line-height: 1;
  }
  .star.filled { color: #C8A857; }
  .star:hover { transform: scale(1.2); }
  .rating-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 5px;
  }
  .rating-label.has-rating { color: #C8A857; font-weight: 600; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 15px;
  }

  /* Results bar */
  .results-bar {
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .results-bar strong { color: var(--text-primary); }

  /* Section visibility */
  .maogok-section { display: block; }
  .maogok-section.hidden { display: none; }
  .airport-section-wrap { display: none; }
  .airport-section-wrap.visible { display: block; }

  /* ── Airport Section ─────────────────── */
  .airport-section {
    margin-bottom: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }
  .airport-section-header {
    background: var(--ci);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Instrument Serif', serif;
    letter-spacing: -0.2px;
  }
  .airport-tabs {
    display: flex;
    gap: 6px;
    padding: 14px 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .airport-tab {
    padding: 7px 14px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .airport-tab:hover { border-color: var(--ci); color: var(--ci); }
  .airport-tab.active {
    background: var(--ci);
    color: #fff;
    border-color: var(--ci);
    font-weight: 600;
  }
  .airport-content { padding: 16px; display: none; }
  .airport-content.active { display: block; }

  .airport-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .airport-table th {
    background: var(--surface-2);
    color: var(--text-muted);
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .airport-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    vertical-align: top;
    line-height: 1.5;
  }
  .airport-table tr:last-child td { border-bottom: none; }
  .airport-table tr:hover td { background: var(--surface-2); }
  .airport-table td:first-child { color: var(--text-muted); font-size: 11px; width: 32px; text-align: center; }
  .price-badge-airport {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 50px;
    white-space: nowrap;
  }
  .price-high { background: var(--ticket-8000); color: var(--ticket-8000-text); }
  .price-mid  { background: var(--ticket-5000); color: var(--ticket-5000-text); }
  .price-low  { background: var(--ticket-4500); color: var(--ticket-4500-text); }
  .airport-note { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

  /* ── Responsive ──────────────────────── */
  @media (max-width: 768px) {
    .header-inner { grid-template-columns: 1fr; }
    .header-right { align-items: flex-start; }
    .header-stats { width: 100%; }
  }
  @media (max-width: 640px) {
    .header { padding: 24px 20px 20px; }
    .cards-grid { grid-template-columns: 1fr; }
    .price-filter { flex-wrap: wrap; }
    .stat-item { padding: 10px 14px; }
  }
</style>
</head>
<body>

function getPriceClass(p) {
  if(p===8000) return 'tag-price-8000';
  if(p===4500) return 'tag-price-4500';
  return 'tag-price-5000';
}
function getPriceLabel(p) {
  if(p===8000) return '🍱 8,000원';
  if(p===4500) return '☕ 4,500원';
  return '🏪 5,000원';
}

// Rating storage
function getRating(no) {
  return parseInt(localStorage.getItem('rating_' + no) || '0');
}
function setRating(no, val) {
  localStorage.setItem('rating_' + no, val);
}
function getRatingLabel(r) {
  const labels = ['', '별로예요', '그저그래요', '괜찮아요', '맛있어요', '최고예요!'];
  return labels[r] || '';
}

function handleStarClick(e, no) {
  e.preventDefault();
  e.stopPropagation();
  const val = parseInt(e.currentTarget.dataset.val);
  const current = getRating(no);
  // 같은 별 누르면 취소
  setRating(no, current === val ? 0 : val);
  updateStars(no);
}

function handleStarHover(e, no) {
  const val = parseInt(e.currentTarget.dataset.val);
  const starsEl = document.querySelectorAll(`.stars[data-no="${no}"] .star`);
  starsEl.forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.val) <= val);
  });
}

function handleStarLeave(no) {
  updateStars(no);
}

function updateStars(no) {
  const r = getRating(no);
  const starsEl = document.querySelectorAll(`.stars[data-no="${no}"] .star`);
  starsEl.forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.val) <= r);
  });
  const label = document.querySelector(`.rating-label[data-no="${no}"]`);
  if (label) {
    label.textContent = r > 0 ? getRatingLabel(r) : '별점 남기기';
    label.classList.toggle('has-rating', r > 0);
  }
}

function bindStarEvents() {
  document.querySelectorAll('.stars').forEach(starsEl => {
    const no = starsEl.dataset.no;
    starsEl.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', e => handleStarClick(e, no));
      star.addEventListener('mouseenter', e => handleStarHover(e, no));
    });
    starsEl.addEventListener('mouseleave', () => handleStarLeave(no));
  });
}

function getFiltered() {
  return data.filter(d => {
    const catMatch = activecat === "전체" || d.cat === activecat;
    const priceMatch = activeprice === "전체" || d.price === parseInt(activeprice);
    const q = document.getElementById('search').value.trim().toLowerCase();
    const searchMatch = !q || d.name.toLowerCase().includes(q) || d.loc.includes(q);
    return catMatch && priceMatch && searchMatch;
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('results-count').textContent = filtered.length;

  // Update counts per cat
  catOrder.forEach(cat => {
    const el = document.getElementById('cnt-' + cat);
    if (!el) return;
    if(cat === "전체") {
      el.textContent = data.filter(d => {
        const priceMatch = activeprice === "전체" || d.price === parseInt(activeprice);
        const q = document.getElementById('search').value.trim().toLowerCase();
        const searchMatch = !q || d.name.toLowerCase().includes(q);
        return priceMatch && searchMatch;
      }).length;
    } else {
      el.textContent = data.filter(d => {
        const priceMatch = activeprice === "전체" || d.price === parseInt(activeprice);
        const q = document.getElementById('search').value.trim().toLowerCase();
        const searchMatch = !q || d.name.toLowerCase().includes(q);
        return d.cat === cat && priceMatch && searchMatch;
      }).length;
    }
  });

  const content = document.getElementById('content');
  if(filtered.length === 0) {
    content.innerHTML = '<div class="no-results">😅 검색 결과가 없어요</div>';
    return;
  }

  // Group by location
  let html = '';
  locOrder.forEach(loc => {
    const items = filtered.filter(d => d.loc === loc);
    if(!items.length) return;
    html += `
      <div class="location-group">
        <div class="location-header">
          <div class="location-dot"></div>
          <div class="location-name">📍 ${loc}</div>
          <div class="location-count">${items.length}개</div>
        </div>
        <div class="cards-grid">
          ${items.map(d => {
            const cleanName = d.name.replace(/\(([^)]*)\)/g, ' $1').replace(/\s+/g, ' ').trim();
            const mapsUrl = `https://map.kakao.com/?q=${encodeURIComponent(cleanName)}`;
            return `
            <a class="restaurant-card" data-cat="${d.cat}" href="${mapsUrl}" target="_blank" rel="noopener noreferrer">
              <div class="card-top">
                <div class="card-name">${d.name}</div>
                <div class="card-num">#${d.no}</div>
              </div>
              <div class="card-tags">
                <span class="tag tag-cat">${d.cat}</span>
                <span class="tag ${getPriceClass(d.price)}">${getPriceLabel(d.price)}</span>
              </div>
              <div class="card-addr">${d.addr}</div>
              <div class="card-bottom">
                <div class="stars" data-no="${d.no}">
                  ${[1,2,3,4,5].map(v => `<span class="star" data-val="${v}">★</span>`).join('')}
                </div>
                <span class="rating-label" data-no="${d.no}">별점 남기기</span>
              </div>
              <div class="map-hint"></div>
            </a>
          `}).join('')}
        </div>
      </div>
    `;
  });

  content.innerHTML = html;
  bindStarEvents();
  data.forEach(d => updateStars(d.no));
}

function getPriceBadgeClass(p) {
  if (p >= 7000) return 'price-high';
  if (p >= 5000) return 'price-mid';
  return 'price-low';
}

function renderAirportTable(airport) {
  const items = airportData[airport];
  if (!items) return '';
  const rows = items.map(d => {
    const priceText = d.price > 0 ? d.price.toLocaleString() + '원' : '직원할인';
    const badgeClass = d.price > 0 ? getPriceBadgeClass(d.price) : 'price-low';
    return `<tr>
      <td>${d.no}</td>
      <td><strong>${d.name}</strong>${d.loc ? `<br><span style="font-size:11px;color:#9e968c;">${d.loc}</span>` : ''}</td>
      <td><span class="price-badge-airport ${badgeClass}">${priceText}</span></td>
      <td class="airport-note">${d.note}</td>
    </tr>`;
  }).join('');
  return `<table class="airport-table">
    <thead><tr><th>#</th><th>업체명</th><th>식권가격</th><th>비고</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}
